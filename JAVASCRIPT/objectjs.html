<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object in JS</title>
</head>
<body>
    <script>
        // objest in js: collection(pair)of keys(properties) and its value.
        // create an object using literal way....

        let student={
            name:"Aditya",
            age:20,
            isMarried:false,
            address:{
                streetNo:36,
                area:"ABESEC",
                city:"GZB",
                pincode:201009
            },
            course:"B.TECH",
            branch:"cse",
            year:2025,
            getInfo:function(){
                return "my education detail is" + student.branch + " "+ student.year
            },
            subjects:["mechanics","mathematics","electronics","SS","DT"],
            examDone:null
        };
        // acess object's keys or property
        console.log(student.adress.pincode); //object
        console.log(student.getinfo()); //function
        console.log()
        console.log(typeof(student));
         // delete any key from object
         console.log(delete student.name);
         console.log(student);

         //find lenght of object
         let keysLength=object.keys(student);
         console.log(keysLength.length);

         //iterate object's keys(properties)
         for(let i=0;i<keysLength.length;i++){
            console.log(student[keysLength[i]]);
         }

         //iterate object's keys(properties) using for in loop;
         for(let x in student){
            console.log(student[x]);
         }

         // create an objectr using new keyword
         let myInfo=new object();
         myInfo.name="Aditya";
         myInfo.age=20;
         myInfo.city="GHAZIABAD";
         myInfo.adress=null;
         myInfo.mob=8273628937;

         //access object's keys using[]
         console.log(myInfo)
    </script>
</body>
</html>
