<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS.INTRODUCTION</title>
</head>
    <h2>JAVA SCRIPT</h2>
<body>
    <script>
        // A JavaScript variable is a named container for a data value that can be used and modified throughout program execution. Variables allow data to be stored, retrieved, and manipulated, making them a fundamental concept in programming.

        // Using VAR KEYWORD
        var myName="abes";
        // DOCUMENT : In JavaScript, the document is a global object that represents the entire web page loaded in the browser. It serves as the entry point for all web page content and structure, which is organized into a hierarchical tree of objects called the Document Object Model (DOM). 
        document.write(myName); //output on browser
        console.log(myName);
        // js execution and scope in js(Global and Local[Block])
        function hello()(
            var asg="thanks to visit";
            console.log(asg);
        )
        hello();

    </script>
    
</body>
</html>
